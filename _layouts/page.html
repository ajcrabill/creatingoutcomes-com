<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Creating Outcomes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #0D4F72;
      --amber:  #B87A10;
      --bg:     #FEFCF8;
      --cream:  #F5F0E8;
      --rule:   #E8E0D0;
      --text:   #1A1A2E;
      --muted:  #6B6878;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    header {
      padding: 44px 24px 32px;
      text-align: center;
    }
    .wordmark {
      display: inline-block;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .nav-links {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 36px;
    }
    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--blue); }

    .accent-rule {
      display: block;
      width: 80px;
      height: 2px;
      background: var(--blue);
      margin: 0 auto 56px;
    }

    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    .page-wrap h1 {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 32px;
    }
    .page-wrap h1 em { font-style: italic; color: var(--blue); }
    .page-body {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text);
    }
    .page-body p { margin-bottom: 24px; }
    .page-body strong { font-weight: 500; color: var(--blue); }
    .page-body h2 {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 1.3rem;
      color: var(--text);
      margin: 48px 0 16px;
    }
    .page-body .premise-box {
      background: var(--cream);
      border-left: 3px solid var(--blue);
      padding: 20px 24px;
      margin: 32px 0;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text);
    }
    .page-body a.back-link {
      display: inline-block;
      margin-top: 48px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--blue);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .page-body a.back-link:hover { text-decoration: underline; }

    footer {
      background: var(--text);
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 40px 20px;
      font-size: 0.82rem;
      line-height: 1.8;
    }

    @media (max-width: 600px) {
      .page-wrap { padding: 36px 20px 60px; }
      .page-wrap h1 { font-size: 1.6rem; }
      .page-body { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/index.html" class="wordmark">Creating Outcomes</a>
    <ul class="nav-links">
      <li><a href="/about.html"{% if page.url == '/about.html' %} class="active"{% endif %}>About</a></li>
      <li><a href="/index.html#questions">Questions</a></li>
      <li><a href="/index.html#subscribe">Subscribe</a></li>
    </ul>
  </header>

  <span class="accent-rule"></span>

  <div class="page-wrap">
    <div class="page-body">
      {{ content }}
    </div>
  </div>

  <footer>
    <p>Creating Outcomes &copy; 2026 &nbsp;&mdash;&nbsp; Governance guidance for boards that exist to make a difference</p>
  </footer>

</body>
</html>
