<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Creating Outcomes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; color: #333; background: #fff; }
    a { text-decoration: none; }
    nav { position: sticky; top: 0; z-index: 100; background: #F5F5F0; border-bottom: 2px solid #0D7377; padding: 0 20px; }
    .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-logo { font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 20px; color: #4A4E69; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { color: #0D7377; font-weight: 500; font-size: 15px; }
    .nav-links a:hover { text-decoration: underline; }
    @media (max-width: 768px) { .nav-links { gap: 16px; } .nav-links a { font-size: 14px; } }
    .article-wrap { padding: 60px 20px; }
    .article { max-width: 720px; margin: 0 auto; }
    .badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; color: #fff; margin-bottom: 20px; }
    .badge-blue { background: #0D4F72; }
    .badge-amber { background: #B87A10; }
    .badge-teal { background: #0D7377; }
    .badge-purple { background: #4A4E69; }
    .badge-green { background: #14A085; }
    .article h1 { font-size: 32px; font-weight: 600; color: #4A4E69; line-height: 1.35; margin-bottom: 12px; }
    .article-date { font-size: 14px; color: #888; margin-bottom: 36px; }
    .article-body { font-size: 17px; line-height: 1.75; color: #333; }
    .article-body p { margin-bottom: 20px; }
    .article-body h2 { font-size: 20px; font-weight: 600; color: #4A4E69; margin: 36px 0 14px; }
    .article-body strong { font-weight: 600; color: #4A4E69; }
    .example-box { background: #E8F6F5; border-left: 4px solid #0D7377; padding: 16px 20px; border-radius: 0 4px 4px 0; margin: 20px 0; font-size: 16px; }
    .example-box .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #0D7377; margin-bottom: 6px; }
    .back-link { display: inline-block; margin-top: 48px; color: #0D7377; font-weight: 500; font-size: 15px; }
    .back-link:hover { text-decoration: underline; }
    footer { background: #4A4E69; color: #fff; text-align: center; padding: 40px 20px; margin-top: 40px; }
    footer p { font-size: 14px; line-height: 1.8; opacity: 0.85; }
    @media (max-width: 768px) { .article h1 { font-size: 24px; } .article-body { font-size: 16px; } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/index.html" class="nav-logo">Creating Outcomes</a>
      <ul class="nav-links">
        <li><a href="/about.html">About</a></li>
        <li><a href="/index.html#questions">Browse Q&amp;As</a></li>
        <li><a href="/index.html#subscribe">Subscribe</a></li>
      </ul>
    </div>
  </nav>
  <div class="article-wrap">
    <div class="article">
      <span class="badge {{ page.badge_class }}">{{ page.category }}</span>
      <h1>{{ page.title }}</h1>
      <p class="article-date">{{ page.date | date: "%B %Y" }}</p>
      <div class="article-body">
        {{ content }}
        <a href="/index.html" class="back-link">&#8592; Back to all Q&amp;As</a>
      </div>
    </div>
  </div>
  <footer>
    <p>Creating Outcomes — practical governance for boards that exist to make a difference</p>
    <p>&copy; 2026 Creating Outcomes</p>
  </footer>
</body>
</html>
